<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Digital menu of the OASIS restaurant at The Traveler Hotel, Lanquín — next to Semuc Champey, Guatemala. Breakfast, lunch, dinner and beverages.">
    <meta name="theme-color" content="#0f2818">

    <!-- Open Graph -->
    <meta property="og:title" content="Digital Menu - OASIS The Traveler">
    <meta property="og:description" content="Breakfast, lunch, dinner and beverages. The Traveler Hotel, Lanquín, Guatemala — next to Semuc Champey.">
    <meta property="og:image" content="assets/branding/logo-oasis.webp">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="en_GT">

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/webp" href="assets/branding/logo-oasis.webp">
    <link rel="apple-touch-icon" href="assets/branding/logo-oasis.webp">
    <title>Digital Menu - OASIS The Traveler | Lanquín, Guatemala</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <div class="header-logo-section">
                <div class="logo-placeholder">
                    <img id="hotel-logo" src="assets/branding/logo-oasis.webp" alt="The Traveler Hotel" class="hotel-logo">
                </div>
                <div class="header-text">
                    <h1 class="logo">OASIS</h1>
                    <p class="tagline">Digital Menu</p>
                </div>
            </div>
        </div>
    </header>

    <!-- Category Navigation -->
    <nav class="categories-nav">
        <button id="search-toggle" class="search-toggle" aria-label="Search">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
        </button>
        <div id="search-container" class="search-container">
            <input type="search" id="search-input" class="search-input" placeholder="Search dish..." aria-label="Search menu">
            <button id="search-clear" class="search-clear" aria-label="Clear search">&times;</button>
        </div>
        <div class="categories-buttons">
            <button class="category-btn active" data-category="breakfast" title="Breakfast" aria-pressed="true">
                Breakfast
            </button>
            <button class="category-btn" data-category="lunch" title="Lunch" aria-pressed="false">
                Lunch
            </button>
            <button class="category-btn" data-category="dinner" title="Dinner" aria-pressed="false">
                Dinner
            </button>
            <button class="category-btn" data-category="snacks" title="Snacks" aria-pressed="false">
                Snacks
            </button>
            <button class="category-btn" data-category="seafood" title="Seafood" aria-pressed="false">
                Seafood
            </button>
            
            <button class="category-btn" data-category="cold-drinks" title="Cold Drinks" aria-pressed="false">
                Cold Drinks
            </button>
            <button class="category-btn" data-category="hot-drinks" title="Hot Drinks" aria-pressed="false">
                Hot Drinks
            </button>
            <button class="category-btn" data-category="alcohol" title="Alcohol" aria-pressed="false">
                Alcohol
            </button>
        </div>
    </nav>

    <!-- Main Container -->
    <main class="main-container">
        <!-- Menu Section -->
        <section class="menu-section">
            <div class="menu-header">
                <h2 id="category-title">Breakfast</h2>
            </div>
            <div class="menu-items" id="menu-items-container"></div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-section footer-info">
                <p>&copy; 2026 The Traveler Hotel - OASIS Restaurant</p>
                <p class="footer-location">Alta Verapaz, Semuc Champey, Guatemala</p>
            </div>
            <div class="footer-section footer-contact">
                <a href="tel:+50240917878" class="contact-link">
                    <span class="contact-icon">📞</span>
                    <span>+502 4091-7878</span>
                </a>
                <a href="tel:+50248887300" class="contact-link">
                    <span class="contact-icon">📞</span>
                    <span>+502 4888-7300</span>
                </a>

            </div>
        </div>
    </footer>

    <!-- Modal de Detalle (Lightbox) -->
    <div id="item-modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-name">
        <div class="modal-content">
            <button id="modal-close" class="modal-close" aria-label="Cerrar">&times;</button>
            <div class="modal-image-container">
                <img id="modal-image" class="modal-image" src="" alt="">
            </div>
            <div class="modal-body">
                <span id="modal-category" class="modal-category"></span>
                <div class="modal-header">
                    <h2 id="modal-name" class="modal-name"></h2>
                    <span id="modal-price" class="modal-price"></span>
                </div>
                <p id="modal-description" class="modal-description"></p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/script.js" defer></script>
    <script>
        if ('serviceWorker' in navigator) {
            let isRefreshing = false;

            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (isRefreshing) {
                    return;
                }

                isRefreshing = true;
                window.location.reload();
            });

            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js', { scope: './' })
                    .then((registration) => registration.update())
                    .catch((error) => {
                        console.error('Service worker registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
